# https://golangci-lint.run/usage/configuration#config-file
version: "2"
linters:
  enable:
    - misspell
    - revive
    - unconvert
  disable:
    - errcheck
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        # Ignore unused parameter rule. It's not enforced by go and
        # it can make it hard to understand what the unused parameter
        # was supposed to be used for.
        text: 'unused-parameter:'
    paths:
      - docs
      - images
      - out
      - script
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - docs
      - images
      - out
      - script
      - third_party$
      - builtin$
      - examples$

run:
  timeout: 3m
